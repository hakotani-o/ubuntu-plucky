# This is a basic workflow to help you get started with Actions

name: ubuntu-image-orangepi-5
on: workflow_dispatch
#workflow_dispatch
#[push]
jobs:
  command:
    name: Use Linux commands
    runs-on: ubuntu-24.04-arm
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v4

      - name: u-boot
        run: /bin/bash  ./das-u-boot.sh orangepi-5-rk3588s_defconfig 07

      - name: kernel
        run: /bin/bash ./build-kernel.sh arm64 2>&1|tee log1

      - name: rootfs
        run: |
            ls
            chmod +x ubuntu-image.sh
            sudo  ./ubuntu-image.sh

      - name: disk image
        run:  |
            chmod +x disk_image.sh
            sudo  ./disk_image.sh arm64 orangepi-5 rk3588s-orangepi-5
            echo "============================"
            ls -l
            echo "============================="
 
#      - name: Upload a diisk image
#        uses: actions/upload-artifact@v4.5.0
#        with:
#         name: ubuntu-image-orangepi-5
#         path: ./Ubuntu-*img.xz
#         compression-level: 0
#          # The desired behavior if no files are found using the provided path.
#         if-no-files-found: error

      - name: Set current datetime as env variable
        env:
          TZ: 'Asia/Tokyo' # タイムゾーン指定
        run: echo "CURRENT_DATETIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $ENV:GITHUB_ENV
        
# 旧: upload-artifact のステップをコメントアウトまたは削除し、以下を追加
      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          # 実行するたびにユニークなタグ名（例: build-1, build-2...）を付けます
          tag_name: build-${{ github.run_number }}
          name: "Orange Pi 5 Disk Image Build ${{ github.run_number }}"
          body: |
            Orange Pi 5 自作ディスクイメージ
            ビルド日時: ${{ env.CURRENT_DATETIME }}
            ベースカーネル: 7.0.0
          draft: false
          prerelease: false
          # ここに圧縮済みファイルのパスを指定します
          files: ./Ubuntu-*img.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

